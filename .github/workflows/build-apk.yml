name: build GalaxyBudsClient APK

on:
  workflow_dispatch:
    inputs:
      repo-url:
        description: 'git clone url'
        required: true
        default: 'https://github.com/timschneeb/GalaxyBudsClient.git'
      repo-commit:
        description: 'commit (optional)'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone GalaxyBudsClient
        run: |
          git clone ${{ github.event.inputs.repo-url }} source
          cd source
          if [ -n "${{ github.event.inputs.repo-commit }}" ]; then
            git checkout ${{ github.event.inputs.repo-commit }}
          fi

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 修正 Android SDK 安装方式，去掉不兼容参数
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android workload
        run: |
          dotnet workload install android
          cd source
          dotnet workload restore

      - name: Build Release APK
        run: |
          cd source
          dotnet build GalaxyBudsClient.Android -c Release -p:AndroidPackageFormat=apk

      - name: Find APK
        id: find-apk
        run: |
          APK_PATH=$(find source -name "*.apk" | head -1)
          echo "apk-path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyBudsClient-APK
          path: ${{ steps.find-apk.outputs.apk-path }}
