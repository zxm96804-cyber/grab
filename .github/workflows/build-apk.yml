name: Build GalaxyBudsClient (Low Memory)

on:
  workflow_dispatch:
    inputs:
      repo-url:
        description: 'Git Clone URL'
        required: true
        default: 'https://github.com/timschneeb/GalaxyBudsClient.git'
      repo-commit:
        description: 'Commit Hash (Optional)'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone Source (Single Branch)
        run: |
          git clone --depth 1 ${{ github.event.inputs.repo-url }} source
          cd source
          if [ -n "${{ github.event.inputs.repo-commit }}" ]; then
            git fetch --unshallow
            git checkout ${{ github.event.inputs.repo-commit }}
          fi

      - name: Setup .NET 8 (Slim)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          dotnet-quality: 'release'

      - name: Install Android Dependencies
        run: |
          # 只安装最小必要依赖，减少内存占用
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            openjdk-17-jdk \
            android-sdk \
            android-sdk-platform-tools

      - name: Restore & Build (Low Memory)
        run: |
          cd source
          # 1. 恢复依赖（单线程，减少内存峰值）
          dotnet workload install android --skip-manifest-update
          dotnet restore GalaxyBudsClient.Android/GalaxyBudsClient.Android.csproj /m:1

          # 2. 直接构建（不加 Sign，避免额外内存消耗）
          dotnet build GalaxyBudsClient.Android/GalaxyBudsClient.Android.csproj \
            -c Release \
            -p:AndroidPackageFormat=apk \
            -p:EmbedAssembliesIntoApk=false \ # 关键：禁用合并 assemblies，大幅减内存
            /m:1 # 单线程编译

      - name: Find APK
        id: find-apk
        run: |
          cd source
          APK_PATH=$(find . -name "*.apk" | head -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Final-APK
          path: source/${{ steps.find-apk.outputs.path }}
